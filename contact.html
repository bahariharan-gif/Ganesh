<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ganesh | Contact</title>
  <style>
    :root {
      --pearl-blue: #2f7896;
      --pearl-blue-deep: #124c66;
      --milky-white: #fbfaf5;
      --ink: #17384a;
      --muted: #607684;
      --line: rgba(18, 76, 102, 0.22);
      --shadow: rgba(23, 56, 74, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.64) 0 8%, transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(251, 250, 245, 0.48) 0 10%, transparent 28%),
        radial-gradient(circle at 74% 78%, rgba(255, 255, 255, 0.32) 0 9%, transparent 25%),
        linear-gradient(135deg, #0f435b 0%, var(--pearl-blue) 48%, #7eb4ca 100%);
      padding: 28px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-radial-gradient(ellipse at 18% 22%, rgba(255, 255, 255, 0.3) 0 2px, transparent 3px 24px),
        repeating-radial-gradient(ellipse at 86% 72%, rgba(18, 76, 102, 0.24) 0 1px, transparent 2px 28px),
        linear-gradient(115deg, transparent 0 16%, rgba(255, 255, 255, 0.22) 16.4% 17.2%, transparent 17.6% 36%, rgba(255, 255, 255, 0.16) 36.4% 37%, transparent 37.4% 100%);
      background-size: 520px 520px, 460px 460px, 290px 290px;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    .shell {
      width: min(1080px, 100%);
      min-height: calc(100vh - 56px);
      margin: 0 auto;
      padding: clamp(24px, 5vw, 58px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: rgba(251, 250, 245, 0.78);
      box-shadow: 0 28px 80px var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: clamp(48px, 8vw, 82px);
    }

    .brand {
      color: var(--pearl-blue-deep);
      font-size: 1.35rem;
      font-weight: 800;
      text-decoration: none;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    nav a {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      padding: 0 16px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
      font-size: 1rem;
    }

    nav a[aria-current="page"] {
      color: #ffffff;
      background: var(--pearl-blue-deep);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--pearl-blue-deep);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 700px;
      margin: 0;
      font-size: clamp(2.7rem, 7vw, 5.2rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .lead {
      max-width: 700px;
      margin: 24px 0 34px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.65;
    }

    .contact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .contact-link {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      color: var(--pearl-blue-deep);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-weight: 400;
      font-style: italic;
      white-space: nowrap;
    }

    .contact-link.primary {
      color: #ffffff;
      background: var(--pearl-blue-deep);
      border-color: rgba(255, 255, 255, 0.44);
      box-shadow: 0 16px 34px rgba(18, 76, 102, 0.28);
    }

    .contact-link svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    footer {
      margin-top: clamp(48px, 9vw, 90px);
      color: var(--ink);
      font-style: italic;
    }

    @media (max-width: 760px) {
      body {
        padding: 18px;
      }

      .shell {
        min-height: calc(100vh - 36px);
        border-radius: 22px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 44px;
      }

      nav {
        justify-content: flex-start;
      }
    }

    @media (max-width: 480px) {
      .contact-list,
      .contact-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a class="brand" href="home.html">Ganesh</a>
      <nav aria-label="Primary navigation">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main>
      <p class="eyebrow">Contact</p>
      <h1>Reach Ganesh directly</h1>
      <p class="lead">
        For any enquiry, use the mobile number or email address below. Both details are
        ready to tap on supported devices.
      </p>

      <div class="contact-list">
        <a class="contact-link primary" href="tel:+919876512345" aria-label="Call +91 98765 12345">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6.6 10.8c1.5 3 3.6 5.1 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3v3.6c0 .7-.6 1.3-1.3 1.3C10.4 21.7 2.3 13.6 2.3 3.3 2.3 2.6 2.9 2 3.6 2h3.6c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2l-2.2 2.2Z" fill="currentColor"/>
          </svg>
          +91 98765 12345
        </a>
        <a class="contact-link" href="mailto:info@ganesh.local" aria-label="Email info@ganesh.local">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4.5 5.5h15c.8 0 1.5.7 1.5 1.5v10c0 .8-.7 1.5-1.5 1.5h-15C3.7 18.5 3 17.8 3 17V7c0-.8.7-1.5 1.5-1.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          info@ganesh.local
        </a>
      </div>
    </main>

    <footer>&copy; owned by www.ganesh.local</footer>
  </div>
</body>
</html>
