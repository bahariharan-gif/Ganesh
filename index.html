<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Maintenance</title>
  <style>
    :root {
      --pearl-blue: #8fc7de;
      --pearl-blue-deep: #2e7fa3;
      --pearl-blue-soft: #d8f0f8;
      --milky-white: #fbfaf5;
      --ink: #17384a;
      --muted: #607684;
      --line: rgba(46, 127, 163, 0.22);
      --shadow: rgba(23, 56, 74, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 255, 255, 0.64) 0 8%, transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(251, 250, 245, 0.48) 0 10%, transparent 28%),
        radial-gradient(circle at 74% 78%, rgba(255, 255, 255, 0.32) 0 9%, transparent 25%),
        linear-gradient(135deg, #59a9ca 0%, var(--pearl-blue) 44%, #ccebf4 100%);
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-radial-gradient(ellipse at 18% 22%, rgba(255, 255, 255, 0.3) 0 2px, transparent 3px 24px),
        repeating-radial-gradient(ellipse at 86% 72%, rgba(46, 127, 163, 0.22) 0 1px, transparent 2px 28px),
        linear-gradient(115deg, transparent 0 16%, rgba(255, 255, 255, 0.22) 16.4% 17.2%, transparent 17.6% 36%, rgba(255, 255, 255, 0.16) 36.4% 37%, transparent 37.4% 100%),
        radial-gradient(circle at 30% 78%, rgba(251, 250, 245, 0.28) 0 2px, transparent 3px),
        radial-gradient(circle at 62% 26%, rgba(251, 250, 245, 0.24) 0 2px, transparent 3px);
      background-size: 520px 520px, 460px 460px, 290px 290px, 52px 52px, 68px 68px;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    main {
      width: min(1040px, 100%);
      min-height: min(680px, calc(100vh - 56px));
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      align-items: center;
      gap: 44px;
      padding: clamp(28px, 6vw, 72px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: rgba(251, 250, 245, 0.76);
      box-shadow: 0 28px 80px var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
      position: relative;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      pointer-events: none;
    }

    .content,
    .visual {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      color: var(--pearl-blue-deep);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    h1 {
      max-width: 680px;
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.6rem, 7vw, 5.7rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .message {
      max-width: 570px;
      margin: 26px 0 34px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .call {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 22px;
      color: #ffffff;
      background: var(--pearl-blue-deep);
      border: 1px solid rgba(255, 255, 255, 0.44);
      border-radius: 999px;
      box-shadow: 0 16px 34px rgba(46, 127, 163, 0.28);
      text-decoration: none;
      font-weight: 400;
      font-style: italic;
      white-space: nowrap;
    }

    .email {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 20px;
      color: var(--pearl-blue-deep);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-weight: 400;
      font-style: italic;
      white-space: nowrap;
    }

    .call svg,
    .email svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    .copyright {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      padding: 0 18px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      font-size: 0.95rem;
      font-weight: 400;
      font-style: italic;
    }

    .visual {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .pearl {
      position: absolute;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffffff, #eaf8fb 42%, #8fc7de);
      box-shadow: inset -18px -22px 34px rgba(46, 127, 163, 0.16), 0 22px 52px rgba(46, 127, 163, 0.2);
    }

    .pearl.one {
      width: 62%;
      inset: auto auto 5% 7%;
      aspect-ratio: 1;
      opacity: 0.96;
    }

    .pearl.two {
      width: 34%;
      inset: 6% 8% auto auto;
      aspect-ratio: 1;
      opacity: 0.88;
    }

    .panel {
      width: 72%;
      aspect-ratio: 0.84;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 18px;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      background: rgba(251, 250, 245, 0.7);
      box-shadow: 0 24px 60px rgba(23, 56, 74, 0.14);
      backdrop-filter: blur(12px);
      z-index: 1;
    }

    .gear {
      width: min(130px, 42%);
      color: var(--pearl-blue-deep);
      filter: drop-shadow(0 14px 20px rgba(46, 127, 163, 0.2));
      animation: turn 13s linear infinite;
      transform-origin: center;
    }

    .progress {
      width: min(210px, 86%);
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(143, 199, 222, 0.26);
    }

    .progress span {
      display: block;
      width: 68%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pearl-blue-deep), var(--pearl-blue));
    }

    .panel-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
      text-align: center;
    }

    @keyframes turn {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 18px;
      }

      main {
        grid-template-columns: 1fr;
        gap: 22px;
        min-height: calc(100vh - 36px);
        border-radius: 22px;
      }

      main::before {
        inset: 12px;
        border-radius: 16px;
      }

      .visual {
        order: -1;
        width: min(360px, 88%);
        margin: 0 auto;
      }

      .panel {
        width: 68%;
        border-radius: 20px;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 30px 22px;
      }

      h1 {
        font-size: clamp(2.45rem, 15vw, 3.75rem);
      }

      .actions,
      .call,
      .copyright {
        width: 100%;
      }

      .copyright {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Website maintenance notice">
    <section class="content">
      <p class="eyebrow">Maintenance Mode</p>
      <h1>Website update in progress</h1>
      <p class="message">
        We are polishing a few things and will be back shortly. For urgent support,
        please contact us on the mobile number  and email id below.
      </p>
      <div class="actions">
        <a class="call" href="tel:+919876512345" aria-label="Call +91 98765 12345">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6.6 10.8c1.5 3 3.6 5.1 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3v3.6c0 .7-.6 1.3-1.3 1.3C10.4 21.7 2.3 13.6 2.3 3.3 2.3 2.6 2.9 2 3.6 2h3.6c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2l-2.2 2.2Z" fill="currentColor"/>
          </svg>
          +91 98765 12345
        </a>
        <a class="email" href="mailto:info@ganesh.local" aria-label="Email info@ganesh.local">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4.5 5.5h15c.8 0 1.5.7 1.5 1.5v10c0 .8-.7 1.5-1.5 1.5h-15C3.7 18.5 3 17.8 3 17V7c0-.8.7-1.5 1.5-1.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          info@ganesh.local
        </a>
        <span class="copyright">&copy; owned by www.ganesh.local</span>
      </div>
    </section>

    <section class="visual" aria-hidden="true">
      <span class="pearl one"></span>
      <span class="pearl two"></span>
      <div class="panel">
        <svg class="gear" viewBox="0 0 120 120" fill="none">
          <path d="M65.7 10 70 22.2a39.7 39.7 0 0 1 8.6 3.6l11.7-5.6 9.6 9.6-5.6 11.7c1.5 2.7 2.7 5.6 3.6 8.6l12.1 4.2v13.6L97.9 72a39.7 39.7 0 0 1-3.6 8.6l5.6 11.7-9.6 9.6-11.7-5.6a39.7 39.7 0 0 1-8.6 3.6L65.7 112H52.1L48 99.9a39.7 39.7 0 0 1-8.6-3.6l-11.7 5.6-9.6-9.6 5.6-11.7A39.7 39.7 0 0 1 20.1 72L8 67.7V54.1l12.1-4.2a39.7 39.7 0 0 1 3.6-8.6l-5.6-11.7 9.6-9.6 11.7 5.6c2.7-1.5 5.6-2.7 8.6-3.6L52.1 10h13.6Z" fill="currentColor" opacity=".16"/>
          <path d="M58.9 82.6a22.6 22.6 0 1 0 0-45.2 22.6 22.6 0 0 0 0 45.2Z" stroke="currentColor" stroke-width="9"/>
          <path d="M58.9 19v15M58.9 86v15M18 60h15M85 60h15M30 31l10.6 10.6M77.2 78.8 87.8 89.4M87.8 31 77.2 41.6M40.6 78.8 30 89.4" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        </svg>
        <div class="progress"><span></span></div>
        <p class="panel-text">We will be soon back</p>
      </div>
    </section>
  </main>
</body>
</html>
